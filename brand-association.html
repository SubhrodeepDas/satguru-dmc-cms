        <style>
                /* Disable global scroll-snap on this page */
                html {
                        scroll-snap-type: none !important;
                }

                .inner-banner-section {
                        scroll-snap-align: none !important;
                        scroll-snap-stop: normal !important;
                }

                /* ── Combined Brand & Association Layout ── */
                .ba-viewport {
                        display: flex;
                        flex-direction: column;
                }

                /* ── Brand Half ── */
                .ba-brand-half {
                        flex: 0 0 50%;
                        background: #ffffff;
                        display: flex;
                        align-items: center;
                        padding: 100px 0;
                        border-bottom: 2px solid #e8f0ec;
                }

                /* Brand logo grid */
                .ba-brand-grid {
                        display: grid;
                        grid-template-columns: repeat(6, 1fr);
                        gap: 20px;
                }

                .ba-brand-card {
                        background: #fff;
                        border: 1.5px solid #e8edf0;
                        border-radius: 18px;
                        padding: 4px 16px;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        gap: 14px;
                        text-align: center;
                        transition: box-shadow 0.22s, transform 0.22s, border-color 0.22s;
                        min-height: 110px;
                }

                .ba-brand-card:hover {
                        box-shadow: 0 8px 28px rgba(17, 67, 73, 0.13);
                        transform: translateY(-3px);
                        border-color: #b8d9b0;
                }

                .ba-brand-icon {

                        border-radius: 14px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                }

                .ba-brand-icon img {
                        width: 100%;
                        height: 88px;
                        border-radius: 14px;
                        display: flex;
                        align-items: center;
                        justify-content: center;

                        object-fit: cover;
                }

                .ba-brand-name {
                        font-size: 15px;
                        font-weight: 800;
                        color: #114349;
                        letter-spacing: 0.2px;
                        line-height: 1.2;
                }

                .ba-brand-tag {
                        font-size: 10.5px;
                        color: #888;
                        font-weight: 500;
                        letter-spacing: 0.3px;
                        text-transform: uppercase;
                }

                /* Per-brand colour accents */
                .ba-brand-st .ba-brand-icon {
                        background: #fff4e6;
                        color: #E8640A;
                }

                .ba-brand-sdmc .ba-brand-icon {
                        background: #e8f6ed;
                        color: #114349;
                }

                .ba-brand-stmc .ba-brand-icon {
                        background: #e8f0fb;
                        color: #2a7fc1;
                }

                .ba-brand-t3 .ba-brand-icon {
                        background: #fff4e6;
                        color: #E8640A;
                }

                .ba-brand-tw .ba-brand-icon {
                        background: #e8f6ed;
                        color: #69AA48;
                }

                .ba-brand-odmc .ba-brand-icon {
                        background: #f0eafc;
                        color: #7c4dcc;
                }

                /* ── Association Half ── */
                .ba-assoc-half {
                        flex: 0 0 50%;
                        background: #f4f8f5;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        padding: 100px 0 80px;
                }

                /* ── Marquee strips ── */
                .assoc-strips-outer {
                        width: 100%;
                        overflow: hidden;
                        -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%);
                        mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%);
                        margin-top: 18px;
                }

                .assoc-strip-row {
                        margin-bottom: 14px;
                        overflow: hidden;
                }

                .assoc-strip-row:last-child {
                        margin-bottom: 0;
                }

                .assoc-strip {
                        display: flex;
                        gap: 14px;
                        width: max-content;
                        align-items: center;
                        will-change: transform;
                }

                .assoc-strip-rtl {
                        animation: assoc-scroll-left 40s linear infinite;
                }

                .assoc-strip-ltr {
                        animation: assoc-scroll-right 40s linear infinite;
                }

                @keyframes assoc-scroll-left {
                        0% {
                                transform: translateX(0);
                        }

                        100% {
                                transform: translateX(-50%);
                        }
                }

                @keyframes assoc-scroll-right {
                        0% {
                                transform: translateX(-50%);
                        }

                        100% {
                                transform: translateX(0);
                        }
                }

                /* Fixed width cards so both halves have identical total width → seamless loop */
                .assoc-logo-card {
                        background: #fff;
                        border: 1.5px solid #e5e5e5;
                        border-radius: 12px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        width: 160px;
                        height: 76px;
                        flex: 0 0 160px;
                        transition: box-shadow 0.2s, border-color 0.2s;
                        overflow: hidden;
                }

                .assoc-logo-card:hover {
                        box-shadow: 0 6px 20px rgba(17, 67, 73, 0.12);
                        border-color: #b8d9b0;
                }

                .assoc-logo-card img {
                        max-height: 66px;
                        max-width: 190px;
                        object-fit: contain;
                        filter: grayscale(25%);
                        transition: filter 0.2s;
                        pointer-events: none;
                }

                .assoc-logo-card.custom-7 img {
                        max-height: 91px;
                        max-width: 190px;
                        object-fit: contain;
                        filter: grayscale(25%);
                        transition: filter 0.2s;
                        pointer-events: none;
                }

                .assoc-logo-card:hover img {
                        filter: grayscale(0%);
                }

                /* Responsive */
                @media (max-width: 1199px) {
                        .ba-brand-grid {
                                grid-template-columns: repeat(3, 1fr);
                        }

                        .ba-viewport {
                                min-height: auto;
                        }

                        .ba-brand-half {
                                flex: none;
                                padding: 60px 0;
                        }

                        .ba-assoc-half {
                                flex: none;
                        }
                }

                @media (max-width: 767px) {
                        .ba-brand-grid {
                                grid-template-columns: repeat(2, 1fr);
                        }

                        .ba-heading {
                                font-size: 24px;
                        }
                }
        </style>
