<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script>
    (function(w){var b='';var p=w.location.pathname;if(p==='/dmc'||p.indexOf('/dmc/')===0)b='/dmc';else if(/(?:^|\.)satgurutravel\.ru$/i.test(w.location.hostname))b='/dmc';w.SATGURU_BASE_PATH=b;w.satguruUrl=function(u){if(!u||/^https?:\/\//i.test(u)||u.indexOf('//')===0)return u;return(b||'')+(u.charAt(0)==='/'?u:'/'+u);};w.prefixRootHtml=function(h){if(!b||!h)return h;return h.replace(/(\s(?:src|href)=["'])\/(?!\/)/g,'$1'+b+'/');};})(window);
    </script>
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16x16.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Satguru DMC Russia</title>
    <meta name="description" content="Thank you for contacting Satguru DMC Russia. We've received your message and will get back to you within 24 hours.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="assets/satoshi-font/css/satoshi.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5ec;
            font-family: inherit;
        }

        .thankyou-wrapper {
            text-align: center;
            padding: 60px 40px;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .check-circle {
            width: 90px;
            height: 90px;
            background: #124349;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: popIn 0.6s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .check-circle svg {
            width: 40px;
            height: 40px;
            stroke: #fff;
        }

        .thankyou-wrapper h1 {
            font-size: 2.8rem;
            color: #124349;
            font-weight: 700;
            margin-bottom: 14px;
            font-family: 'Satoshi-Variable';

        }

        .thankyou-wrapper h1 span {
            color: #6abf4b;
        }

        .thankyou-wrapper p {
            font-size: 1rem;
            color: #555;
            max-width: 500px;
            margin: 0 auto 30px;
            line-height: 30px;
            font-weight: 500;
            font-family: 'Satoshi-Variable';

        }

        /* Countdown ring */
        .countdown-ring {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto;
        }

        .countdown-ring svg {
            transform: rotate(-90deg);
        }

        .countdown-ring circle {
            fill: none;
            stroke-width: 4;
        }

        .ring-bg {
            stroke: #e0e0e0;
        }

        .ring-fill {
            stroke: #124349;
            stroke-dasharray: 163;
            stroke-dashoffset: 0;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .countdown-number {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-family: 'Satoshi-Variable';
            font-weight: 700;
            color: #124349;
        }

        .redirect-note {
            font-size: 0.85rem;
            color: #999;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="thankyou-wrapper">

        <!-- Checkmark icon -->
        <div class="check-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
            </svg>
        </div>

        <h1>Thank You for <span>Contacting Us!</span></h1>
        <p>We've received your message and will get back to you as soon as possible. Our team typically responds within
            24 hours.</p>

        <!-- Countdown Ring -->
        <div class="countdown-ring">
            <svg width="60" height="60" viewBox="0 0 60 60">
                <circle class="ring-bg" cx="30" cy="30" r="26" />
                <circle class="ring-fill" cx="30" cy="30" r="26" id="ringFill" />
            </svg>
            <div class="countdown-number" id="countNum">3</div>
        </div>
        <p class="redirect-note">Redirecting you to home page...</p>

    </div>

    <script>
        const total = 3;
        const circumference = 2 * Math.PI * 26; // ≈ 163
        const ring = document.getElementById('ringFill');
        const numEl = document.getElementById('countNum');
        let remaining = total;

        ring.style.strokeDasharray = circumference;
        ring.style.strokeDashoffset = 0;

        const interval = setInterval(() => {
            remaining--;
            numEl.textContent = remaining;

            // Shrink ring proportionally
            const offset = circumference * (1 - remaining / total);
            ring.style.strokeDashoffset = offset;

            if (remaining <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html'; // ← change to your home page
            }
        }, 1000);
    </script>
    <!-- GSAP + ScrollTrigger + Parallax -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="assets/js/parallax.js"></script>

</body>

</html>
