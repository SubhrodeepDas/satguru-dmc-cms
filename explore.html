    <style>
        /* ═══════════════════════════════════════════════
           EXPLORE PAGE — destination card overrides
        ═══════════════════════════════════════════════ */

        /* Card height — matches popular-itineraries */
        .tour-explore-card {
            height: 320px !important;
        }

        /* ── Destination search bar ── */
        .dest-search-wrap {
            margin-bottom: 2.2rem;
        }

        .dest-search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border: 1.5px solid rgba(17, 67, 73, 0.18);
            border-radius: 100px;
            padding: 13px 24px;
            box-shadow: 0 2px 16px rgba(17, 67, 73, 0.07);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .dest-search-bar:focus-within {
            border-color: rgba(17, 67, 73, 0.45);
            box-shadow: 0 4px 22px rgba(17, 67, 73, 0.13);
        }

        .dest-search-bar i {
            font-size: 1.15rem;
            color: #114349;
            flex-shrink: 0;
        }

        .dest-search-bar input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-family: 'Satoshi-Variable', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: #114349;
            line-height: 1.5;
        }

        .dest-search-bar input::placeholder {
            color: rgba(17, 67, 73, 0.45);
        }

        /* ── Explore hero Swiper ── */
        .explore-hero-swiper {
            position: absolute !important;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 0;
        }

        .explore-hero-swiper .swiper-slide {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Dot pagination — position above content */
        .explore-hero-swiper .swiper-pagination {
            bottom: 22px;
            z-index: 10;
        }

        .explore-hero-swiper .swiper-pagination-bullet {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.55);
            opacity: 1;
        }

        .explore-hero-swiper .swiper-pagination-bullet-active {
            background: #69AA48;
            width: 24px;
            border-radius: 4px;
        }

        /* Hide cards that don't match search */
        .tour-dest-col.dest-hidden {
            display: none;
        }

        @media (max-width: 767px) {
            .tour-explore-card {
                height: 260px;
            }

            .tour-explore-card__name {
                font-size: 1.1rem;
            }

            .tour-explore-card__desc {
                font-size: 14px;
            }
        }
    </style>

    <!-- CMS dynamic loaders — explore.html -->
    <script>
    (async function () {
        function escHtml(s) {
            return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
        }

        function destHref(slug) {
            if (!slug) return '#';
            if (slug.indexOf('.html') !== -1 || slug.indexOf('http') === 0 || slug.indexOf('/') === 0) return slug;
            return 'explore/' + encodeURIComponent(slug);
        }

        // ── 1. Banner Swiper ──
        function applyExploreBannerBg() {
            document.querySelectorAll('.explore-hero-swiper .explore-slide').forEach(function (el) {
                var bg = el.getAttribute('data-bg');
                if (bg) el.style.backgroundImage = "url('" + bg + "')";
            });
        }

        var swiperWrapper = document.querySelector('.explore-hero-swiper .swiper-wrapper');
        try {
            var bannerData = await satguruCMS.getExploreBannerSlides();
            if (bannerData && bannerData.docs && bannerData.docs.length && swiperWrapper) {
                swiperWrapper.innerHTML = bannerData.docs.map(function (slide) {
                    var img = slide.imageUrl || satguruCMS.imgUrl(slide.image) || '';
                    return '<div class="swiper-slide explore-slide" data-bg="' + escHtml(img) + '"></div>';
                }).join('');
            }
        } catch (e) { /* keep static slides */ }

        new Swiper('.explore-hero-swiper', {
            loop: true,
            effect: 'fade',
            fadeEffect: { crossFade: true },
            speed: 1400,
            autoplay: { delay: 4000, disableOnInteraction: false },
            allowTouchMove: false,
            pagination: { el: '.explore-hero-swiper .swiper-pagination', clickable: true },
            on: {
                init: function () { applyExploreBannerBg(); },
            },
        });

        // ── 2. Destination cards grid — from ExploreListings collection ──
        try {
            var listingsData = await satguruCMS.getExploreListings(100);
            if (listingsData && listingsData.docs && listingsData.docs.length) {
                var grid = document.getElementById('destGrid');
                if (grid) {
                    grid.innerHTML = listingsData.docs.map(function (item) {
                        var img  = item.imageUrl || satguruCMS.imgUrl(item.image) || '';
                        var name = item.destinationName || '';
                        var href = destHref(item.destinationSlug || '');
                        return '<div class="col-lg-4 col-md-6 col-12 tour-dest-col" data-name="' + escHtml(name.toLowerCase()) + '">' +
                            '<a href="' + escHtml(href) + '" class="tour-explore-card">' +
                            '<img src="' + escHtml(img) + '" alt="' + escHtml(name) + '" class="tour-explore-card__img" loading="lazy">' +
                            '<span class="tour-explore-card__overlay"></span>' +
                            '<h3 class="tour-explore-card__title">' + escHtml(name) +
                            '<span class="tour-explore-card__arrow"><i class="ri-arrow-right-up-line"></i></span>' +
                            '</h3></a></div>';
                    }).join('');
                }
            }
        } catch (e) { /* keep static fallback cards */ }

    })();
    </script>

    <!-- Live search — filters cards by name, shows "no results" message -->
    <script>
    (function () {
        var input     = document.getElementById('destSearch');
        var noResults = document.getElementById('destNoResults');
        if (!input) return;

        function runSearch() {
            var q     = input.value.trim().toLowerCase();
            var cols  = document.querySelectorAll('#destGrid .tour-dest-col');
            var shown = 0;

            cols.forEach(function (col) {
                var name    = (col.getAttribute('data-name') || '').toLowerCase();
                var visible = !q || name.indexOf(q) !== -1;
                col.classList.toggle('dest-hidden', !visible);
                if (visible) shown++;
            });

            if (noResults) {
                noResults.style.display = (q && shown === 0) ? 'block' : 'none';
            }
        }

        input.addEventListener('input', runSearch);

        // Clear search on Escape
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                input.value = '';
                runSearch();
                input.blur();
            }
        });
    })();
    </script>
