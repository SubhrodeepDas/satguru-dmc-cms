    <script>
    (function(w){var b='';var p=w.location.pathname;if(p==='/dmc'||p.indexOf('/dmc/')===0)b='/dmc';else if(/(?:^|\.)satgurutravel\.ru$/i.test(w.location.hostname))b='/dmc';w.SATGURU_BASE_PATH=b;w.satguruUrl=function(u){if(!u||/^https?:\/\//i.test(u)||u.indexOf('//')===0)return u;return(b||'')+(u.charAt(0)==='/'?u:'/'+u);};w.prefixRootHtml=function(h){if(!b||!h)return h;return h.replace(/(\s(?:src|href)=["'])\/(?!\/)/g,'$1'+b+'/');};})(window);
