<!DOCTYPE html>

    <script>
    (function(w){var p=w.location.pathname;var b=p==='/dmc'||p.indexOf('/dmc/')===0?'/dmc':'';w.SATGURU_BASE_PATH=b;w.satguruUrl=function(u){if(!u||/^https?:\/\//i.test(u)||u.indexOf('//')===0)return u;return(b||'')+(u.charAt(0)==='/'?u:'/'+u);};w.prefixRootHtml=function(h){if(!b||!h)return h;return h.replace(/(\s(?:src|href)=["'])\/(?!\/)/g,'$1'+b+'/');};})(window);

    <script>(function(){document.querySelectorAll('link[rel="icon"],link[rel="apple-touch-icon"]').forEach(function(el){var h=el.getAttribute('href');if(h&&h.charAt(0)==='/'&&!h.startsWith('//'))el.href=satguruUrl(h);});})();</script>
